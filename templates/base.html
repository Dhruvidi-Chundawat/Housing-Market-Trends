<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Housing Market Analysis{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">🏠 Housing Market Analysis</div>
            <nav>
                <a href="/" class="{% if request.endpoint == 'home' %}active{% endif %}">Home</a>
                <a href="/dashboard" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/storyboard" class="{% if request.endpoint == 'storyboard' %}active{% endif %}">Storyboard</a>
                <a href="/about" class="{% if request.endpoint == 'about' %}active{% endif %}">About</a>
            </nav>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 Housing Market Trends Analysis | Built with Flask & Tableau Public</p>
    </footer>
</body>
</html>
